spring.application.name=rateLimiter

# Database Configuration
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# swagger-ui custom path
##springdoc.swagger-ui.path=/swagger-ui.html

# Redis Configuration
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT}
spring.data.redis.timeout=2000ms
spring.data.redis.connect-timeout=2000ms
spring.data.redis.database=0
spring.data.redis.client-type=lettuce
spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=0
spring.data.redis.lettuce.shutdown-timeout=200ms

logging.level.root=INFO
logging.level.com.ratelimiter=DEBUG

# JWT Configuration
KEY=${JWT_SECRET}
JWT_EXPIRATION_MS=${JWT_EXPIRATION_MS:3600000}
JWT_ISSUER=${JWT_ISSUER}

#ADMIN
ADM_EMAIL=${ADM_EMAIL}
ADM_PASSWORD=#{ADM_PASSWORD}
